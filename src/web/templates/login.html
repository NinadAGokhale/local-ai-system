<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saratthya — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #fe6c19;
            --orange-dark: #e05a0e;
            --orange-light: #fb975b;
            --bg: #0a0a0a;
            --surface: #111111;
            --surface-2: #1a1a1a;
            --border: #2a2a2a;
            --text: #e5e5e5;
            --text-dim: #888888;
            --text-muted: #555555;
            --radius: 12px;
        }
        [data-theme="light"] {
            --bg: #f5f5f0;
            --surface: #ffffff;
            --surface-2: #f0f0eb;
            --border: #d4d4c8;
            --text: #1a1a1a;
            --text-dim: #6b6b6b;
            --text-muted: #999999;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.25s, color 0.25s;
        }
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px 40px;
            width: 380px;
            max-width: 90vw;
            text-align: center;
            transition: background 0.25s, border-color 0.25s;
        }
        .logo {
            width: 72px;
            height: 72px;
            border-radius: 18px;
            margin: 0 auto 16px;
            overflow: hidden;
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        h1 {
            font-size: 20px;
            font-weight: 600;
            color: var(--orange-light);
            margin-bottom: 4px;
        }
        .tagline {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .field {
            margin-bottom: 16px;
            text-align: left;
        }
        .field label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 6px;
        }
        .field input {
            width: 100%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 12px 14px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, background 0.25s, color 0.25s;
        }
        .field input:focus { border-color: var(--orange); }
        .field input::placeholder { color: var(--text-muted); }
        .error {
            font-size: 12px;
            color: #ef4444;
            margin-bottom: 12px;
            display: none;
        }
        .error.show { display: block; }
        .btn {
            width: 100%;
            background: var(--orange);
            border: none;
            border-radius: 8px;
            color: #fff;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 8px;
        }
        .btn:hover { opacity: 0.85; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .footer {
            margin-top: 24px;
            font-size: 10px;
            color: var(--text-muted);
        }
        .theme-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 16px;
            padding: 6px 8px;
            line-height: 1;
            transition: background 0.2s, color 0.2s, border-color 0.25s;
        }
        .theme-btn:hover {
            background: var(--surface-2);
            color: var(--text);
        }
        .login-card-wrap {
            position: relative;
        }
    </style>
</head>
<body>
    <div class="login-card login-card-wrap">
        <button class="theme-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
        <div class="logo"><img src="/static/logo.jpeg" alt="Saratthya"></div>
        <h1>Saratthya</h1>
        <div class="tagline">Agentic Market Analytics &amp; Business Development</div>
        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="error" id="login-error"></div>
            <div class="field">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username" autocomplete="username" required>
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required>
            </div>
            <button class="btn" id="login-btn" type="submit">Sign In</button>
        </form>
        <div class="footer">Agentic Market Analytics &amp; Business Development</div>
    </div>
    <script>
        function initTheme() {
            const saved = localStorage.getItem('saratthya-theme');
            let theme = saved;
            if (!theme) {
                theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
            }
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('theme-toggle').textContent = theme === 'light' ? '☀️' : '🌙';
        }
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('saratthya-theme', next);
            document.getElementById('theme-toggle').textContent = next === 'light' ? '☀️' : '🌙';
        }
        initTheme();
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const err = document.getElementById('login-error');
            btn.disabled = true;
            err.classList.remove('show');
            try {
                const r = await fetch('/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value,
                    }),
                });
                const data = await r.json();
                if (data.ok) {
                    window.location.href = '/';
                } else {
                    err.textContent = data.error || 'Login failed';
                    err.classList.add('show');
                }
            } catch(e) {
                err.textContent = 'Connection error';
                err.classList.add('show');
            }
            btn.disabled = false;
        }
    </script>
</body>
</html>
